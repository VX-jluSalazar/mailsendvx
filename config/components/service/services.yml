services:
  prestashop.module.mailsendvx.repository.template:
    class: Velox\MailSendVx\Repository\MailSendVxTemplateRepository
    public: true
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $databasePrefix: '%database_prefix%'

  prestashop.module.mailsendvx.repository.log:
    class: Velox\MailSendVx\Repository\MailSendVxLogRepository
    public: true
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $databasePrefix: '%database_prefix%'

  prestashop.module.mailsendvx.repository.event:
    class: Velox\MailSendVx\Repository\MailSendVxEventRepository
    public: true
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $databasePrefix: '%database_prefix%'

  prestashop.module.mailsendvx.repository.queue:
    class: Velox\MailSendVx\Repository\MailSendVxQueueRepository
    public: true
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $databasePrefix: '%database_prefix%'

  prestashop.module.mailsendvx.provider.prestashop_mail:
    class: Velox\MailSendVx\Provider\MailSendVxPrestaShopMailProvider
    public: true

  prestashop.module.mailsendvx.service.variable_renderer:
    class: Velox\MailSendVx\Service\MailSendVxVariableRenderer
    public: true

  prestashop.module.mailsendvx.service.template_engine.legacy:
    class: Velox\MailSendVx\Service\LegacyPlaceholderTemplateEngine
    public: true

  prestashop.module.mailsendvx.service.template_engine.twig:
    class: Velox\MailSendVx\Service\TwigTemplateEngine
    public: true

  prestashop.module.mailsendvx.service.template_renderer:
    class: Velox\MailSendVx\Service\MailSendVxTemplateRenderer
    public: true
    arguments:
      $legacyEngine: '@prestashop.module.mailsendvx.service.template_engine.legacy'
      $twigEngine: '@prestashop.module.mailsendvx.service.template_engine.twig'

  prestashop.module.mailsendvx.service.logger:
    class: Velox\MailSendVx\Service\MailSendVxLogger
    public: true
    arguments:
      $repository: '@prestashop.module.mailsendvx.repository.log'

  prestashop.module.mailsendvx.service.mailer:
    class: Velox\MailSendVx\Service\MailSendVxMailer
    public: true
    arguments:
      $templates: '@prestashop.module.mailsendvx.repository.template'
      $logs: '@prestashop.module.mailsendvx.repository.log'
      $provider: '@prestashop.module.mailsendvx.provider.prestashop_mail'
      $renderer: '@prestashop.module.mailsendvx.service.template_renderer'

  prestashop.module.mailsendvx.service.order_state_event:
    class: Velox\MailSendVx\Service\OrderStateEventService
    public: true
    arguments:
      $context: "@=service('prestashop.adapter.legacy.context').getContext()"

  prestashop.module.mailsendvx.service.context_builder.order:
    class: Velox\MailSendVx\Service\OrderTemplateContextBuilder
    public: true
    arguments:
      $context: "@=service('prestashop.adapter.legacy.context').getContext()"
      $orderStateEventService: '@prestashop.module.mailsendvx.service.order_state_event'

  prestashop.module.mailsendvx.service.context_builder.customer:
    class: Velox\MailSendVx\Service\CustomerTemplateContextBuilder
    public: true
    arguments:
      $context: "@=service('prestashop.adapter.legacy.context').getContext()"

  prestashop.module.mailsendvx.service.context_builder.newsletter:
    class: Velox\MailSendVx\Service\NewsletterTemplateContextBuilder
    public: true
    arguments:
      $context: "@=service('prestashop.adapter.legacy.context').getContext()"

  prestashop.module.mailsendvx.service.event_context:
    class: Velox\MailSendVx\Service\EventTemplateContextService
    public: true
    arguments:
      $orderBuilder: '@prestashop.module.mailsendvx.service.context_builder.order'
      $customerBuilder: '@prestashop.module.mailsendvx.service.context_builder.customer'
      $newsletterBuilder: '@prestashop.module.mailsendvx.service.context_builder.newsletter'

  prestashop.module.mailsendvx.service.instant_email_hook:
    class: Velox\MailSendVx\Service\InstantEmailHookService
    public: true
    arguments:
      $context: "@=service('prestashop.adapter.legacy.context').getContext()"
      $eventContextService: '@prestashop.module.mailsendvx.service.event_context'
      $orderStateEventService: '@prestashop.module.mailsendvx.service.order_state_event'
      $templateRepository: '@prestashop.module.mailsendvx.repository.template'
      $eventRepository: '@prestashop.module.mailsendvx.repository.event'
      $logRepository: '@prestashop.module.mailsendvx.repository.log'
      $mailer: '@prestashop.module.mailsendvx.service.mailer'

  prestashop.module.mailsendvx.service.template_content:
    class: Velox\MailSendVx\Service\TemplateContentService
    public: true

  prestashop.module.mailsendvx.service.wrapper_manager:
    class: Velox\MailSendVx\Service\MailTemplateWrapperService
    public: true

  prestashop.module.mailsendvx.service.dashboard_view:
    class: Velox\MailSendVx\Service\DashboardViewService
    public: true
    arguments:
      $context: "@=service('prestashop.adapter.legacy.context').getContext()"
      $templateRepository: '@prestashop.module.mailsendvx.repository.template'
      $queueRepository: '@prestashop.module.mailsendvx.repository.queue'
      $eventRepository: '@prestashop.module.mailsendvx.repository.event'
      $logRepository: '@prestashop.module.mailsendvx.repository.log'

  prestashop.module.mailsendvx.service.template_admin:
    class: Velox\MailSendVx\Service\TemplateAdminService
    public: true
    arguments:
      $context: "@=service('prestashop.adapter.legacy.context').getContext()"
      $eventContextService: '@prestashop.module.mailsendvx.service.event_context'
      $orderStateEventService: '@prestashop.module.mailsendvx.service.order_state_event'
      $templateContentService: '@prestashop.module.mailsendvx.service.template_content'
      $templateRepository: '@prestashop.module.mailsendvx.repository.template'
      $eventRepository: '@prestashop.module.mailsendvx.repository.event'
      $wrapperService: '@prestashop.module.mailsendvx.service.wrapper_manager'
      $mailer: '@prestashop.module.mailsendvx.service.mailer'
      $templateRenderer: '@prestashop.module.mailsendvx.service.template_renderer'
