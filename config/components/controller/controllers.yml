      - { name: controller.service_arguments }

  Velox\MailSendVx\Controller\Admin\TemplatesController:
    public: true
    arguments:
      - '@prestashop.module.mailsendvx.service.template_admin'
    tags:
      - { name: controller.service_arguments }

