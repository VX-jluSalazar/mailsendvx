<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ shop.name }}</title>
</head>
<body style="background:#f4f4f4;margin:0;padding:24px;font-family:Arial,Helvetica,sans-serif;color:#333;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:640px;margin:0 auto;background:#ffffff;border-collapse:collapse;">
    <tr>
      <td style="padding:24px;font-size:15px;line-height:1.5;">
        {{ mailsendvx_html_content|raw }}
      </td>
    </tr>
    <tr>
      <td style="border-top:1px solid #e5e5e5;color:#777;font-size:12px;padding:16px 24px;">
        {{ shop.name }}<br>
        <a href="{{ shop.url }}" style="color:#25b9d7;">{{ shop.url }}</a>
        {% if shop.unsubscribe_url %}<br><a href="{{ shop.unsubscribe_url }}" style="color:#25b9d7;">Desuscribirme</a>{% endif %}
      </td>
    </tr>
  </table>
</body>
</html>
