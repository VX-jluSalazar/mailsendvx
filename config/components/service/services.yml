services:
  prestashop.module.mailsendvx.repository.template:
    class: Velox\MailSendVx\Repository\MailSendVxTemplateRepository
    public: true
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $databasePrefix: '%database_prefix%'

  prestashop.module.mailsendvx.repository.log:
    class: Velox\MailSendVx\Repository\MailSendVxLogRepository
    public: true
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $databasePrefix: '%database_prefix%'

  prestashop.module.mailsendvx.repository.event:
    class: Velox\MailSendVx\Repository\MailSendVxEventRepository
    public: true
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $databasePrefix: '%database_prefix%'

  prestashop.module.mailsendvx.repository.queue:
    class: Velox\MailSendVx\Repository\MailSendVxQueueRepository
    public: true
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $databasePrefix: '%database_prefix%'

  prestashop.module.mailsendvx.repository.flow:
    class: Velox\MailSendVx\Repository\MailSendVxFlowRepository
    public: true
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $databasePrefix: '%database_prefix%'
      $templateRepository: '@prestashop.module.mailsendvx.repository.template'

  prestashop.module.mailsendvx.repository.abandoned_cart:
    class: Velox\MailSendVx\Repository\MailSendVxAbandonedCartRepository
    public: true
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $databasePrefix: '%database_prefix%'

  prestashop.module.mailsendvx.repository.wrapper:
    class: Velox\MailSendVx\Repository\MailSendVxWrapperRepository
    public: true
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $databasePrefix: '%database_prefix%'

  prestashop.module.mailsendvx.provider.prestashop_mail:
    class: Velox\MailSendVx\Provider\MailSendVxPrestaShopMailProvider
    public: true

  prestashop.module.mailsendvx.service.variable_renderer:
    class: Velox\MailSendVx\Service\Template\MailSendVxVariableRenderer
    public: true
    arguments:
      $twigEngine: '@prestashop.module.mailsendvx.service.template_engine.twig'

  prestashop.module.mailsendvx.service.template_engine.twig:
    class: Velox\MailSendVx\Service\Template\TwigTemplateEngine
    public: true

  prestashop.module.mailsendvx.service.template_renderer:
    class: Velox\MailSendVx\Service\Template\MailSendVxTemplateRenderer
    public: true
    arguments:
      $twigEngine: '@prestashop.module.mailsendvx.service.template_engine.twig'

  prestashop.module.mailsendvx.service.logger:
    class: Velox\MailSendVx\Service\Support\MailSendVxLogger
    public: true
    arguments:
      $repository: '@prestashop.module.mailsendvx.repository.log'

  prestashop.module.mailsendvx.service.flow_condition_evaluator:
    class: Velox\MailSendVx\Service\Flow\FlowConditionEvaluator
    public: true

  prestashop.module.mailsendvx.service.flow_scheduler:
    class: Velox\MailSendVx\Service\Flow\FlowSchedulerService
    public: true
    arguments:
      $flowRepository: '@prestashop.module.mailsendvx.repository.flow'
      $queueRepository: '@prestashop.module.mailsendvx.repository.queue'
      $logRepository: '@prestashop.module.mailsendvx.repository.log'
      $conditionEvaluator: '@prestashop.module.mailsendvx.service.flow_condition_evaluator'

  prestashop.module.mailsendvx.service.flow_worker:
    class: Velox\MailSendVx\Service\Flow\FlowWorkerService
    public: true
    arguments:
      $context: "@=service('prestashop.adapter.legacy.context').getContext()"
      $queueRepository: '@prestashop.module.mailsendvx.repository.queue'
      $flowRepository: '@prestashop.module.mailsendvx.repository.flow'
      $templateRepository: '@prestashop.module.mailsendvx.repository.template'
