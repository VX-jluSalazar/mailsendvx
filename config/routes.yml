mailsendvx_configuration:
  path: /mailsendvx/configuration
  methods: [GET, POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\ConfigurationController::indexAction'
    _legacy_controller: AdminMailsendvxConfigure
    _legacy_link: AdminMailsendvxConfigure

mailsendvx_templates:
  path: /mailsendvx/templates
  methods: [GET, POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\TemplatesController::indexAction'
    _legacy_controller: AdminMailsendvxTemplates
    _legacy_link: AdminMailsendvxTemplates

mailsendvx_template_create:
  path: /mailsendvx/templates/create
  methods: [GET, POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\TemplatesController::createAction'
    _legacy_controller: AdminMailsendvxTemplates

mailsendvx_template_edit:
  path: /mailsendvx/templates/{idTemplate}/edit
  methods: [GET, POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\TemplatesController::editAction'
    _legacy_controller: AdminMailsendvxTemplates
  requirements:
    idTemplate: \d+

mailsendvx_flows:
  path: /mailsendvx/flows
  methods: [GET, POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\FlowsController::indexAction'
    _legacy_controller: AdminMailsendvxFlows
    _legacy_link: AdminMailsendvxFlows

mailsendvx_wrappers:
  path: /mailsendvx/wrappers
  methods: [GET, POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\WrappersController::indexAction'
    _legacy_controller: AdminMailsendvxWrappers
    _legacy_link: AdminMailsendvxWrappers

mailsendvx_wrapper_create:
  path: /mailsendvx/wrappers/create
  methods: [GET, POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\WrappersController::createAction'
    _legacy_controller: AdminMailsendvxWrappers

mailsendvx_wrapper_edit:
  path: /mailsendvx/wrappers/{wrapperName}/{idLang}/edit
  methods: [GET, POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\WrappersController::editAction'
    _legacy_controller: AdminMailsendvxWrappers
  requirements:
    wrapperName: '[A-Za-z0-9_]+'
    idLang: \d+

mailsendvx_documentation:
  path: /mailsendvx/documentation
  methods: [GET]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\DocumentationController::indexAction'
    _legacy_controller: AdminMailsendvxDocumentation
    _legacy_link: AdminMailsendvxDocumentation

mailsendvx_documentation_fixture_download:
  path: /mailsendvx/documentation/fixtures/{fixtureKey}/download
  methods: [GET]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\DocumentationController::downloadFixtureAction'
    _legacy_controller: AdminMailsendvxDocumentation
  requirements:
    fixtureKey: order|cart|subscriber

mailsendvx_template_delete:
  path: /mailsendvx/templates/{idTemplate}/delete
  methods: [POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\TemplatesController::deleteAction'
    _legacy_controller: AdminMailsendvxTemplates
  requirements:
    idTemplate: \d+

mailsendvx_template_bulk_delete:
  path: /mailsendvx/templates/bulk-delete
  methods: [POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\TemplatesController::bulkDeleteAction'
    _legacy_controller: AdminMailsendvxTemplates

mailsendvx_template_preview:
  path: /mailsendvx/templates/{idTemplate}/preview
  methods: [GET]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\TemplatesController::previewAction'
    _legacy_controller: AdminMailsendvxTemplates
  requirements:
    idTemplate: \d+

mailsendvx_template_test:
  path: /mailsendvx/templates/{idTemplate}/test
  methods: [POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\TemplatesController::sendTestAction'
    _legacy_controller: AdminMailsendvxTemplates
  requirements:
    idTemplate: \d+

mailsendvx_wrapper_delete:
  path: /mailsendvx/wrappers/{idWrapper}/delete
  methods: [POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\WrappersController::deleteAction'
    _legacy_controller: AdminMailsendvxWrappers
  requirements:
    idWrapper: \d+

mailsendvx_dashboard:
  path: /mailsendvx/dashboard
  methods: [GET, POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\DashboardController::indexAction'
    _legacy_controller: AdminMailsendvxDashboard
    _legacy_link: AdminMailsendvxDashboard

mailsendvx_queue_cancel:
  path: /mailsendvx/queue/{idQueue}/cancel
  methods: [POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\FlowsController::cancelQueueJobAction'
    _legacy_controller: AdminMailsendvxFlows
  requirements:
    idQueue: \d+

mailsendvx_queue_bulk_cancel:
  path: /mailsendvx/queue/bulk-cancel
  methods: [POST]
  defaults:
    _controller: 'Velox\MailSendVx\Controller\Admin\FlowsController::cancelQueueBulkAction'
    _legacy_controller: AdminMailsendvxFlows
